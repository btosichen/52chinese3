<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>色香味的陽光｜互動學習</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:"Noto Sans TC";
margin:0;
background:linear-gradient(135deg,#FFF9C4,#DCEDC8,#B3E5FC);
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:20px;
padding:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

button{
font-size:22px;
padding:14px 20px;
border:none;
border-radius:12px;
cursor:pointer;
}

.menu button{
width:100%;
margin:10px 0;
font-size:26px;
background:#FFD54F;
}

.question{
font-size:28px;
margin-bottom:20px;
}

.option{
display:block;
width:100%;
margin:10px 0;
padding:14px;
background:#f5f5f5;
border-radius:12px;
cursor:pointer;
}

.option:hover{
background:#dbeafe;
}

.correct{
background:#C8E6C9;
}

.wrong{
background:#FFCDD2;
}

.progress{
height:10px;
background:#eee;
border-radius:10px;
margin-bottom:20px;
}

.bar{
height:10px;
background:#4CAF50;
width:0%;
border-radius:10px;
}

.result{
text-align:center;
font-size:50px;
color:red;
}

</style>
</head>

<body>

<div class="container">

<div id="app"></div>

</div>

<script>

// 題庫
const quizData = [

{
question:"果園裡的水果顏色鮮豔，看起來____。",
options:["五彩繽紛","問道於盲","窮途末路","一席之地"],
answer:"五彩繽紛"
},

{
question:"這次園遊會準備得很充分，大家都覺得活動會辦得____。",
options:["勇冠三軍","轟轟烈烈","血盆大口","刁鑽古怪"],
answer:"轟轟烈烈"
},

{
question:"老師提醒我們要記取前人的錯誤，當作____。",
options:["莫逆之交","前車之鑑","險遭不測","易如反掌"],
answer:"前車之鑑"
},

{
question:"果樹下的陽光灑落在地面，和綠葉互相襯托，顯得____。",
options:["相映成趣","千軍萬馬","窮途末路","問道於盲"],
answer:"相映成趣"
},

{
question:"「五彩繽紛」可以用來形容顏色很多、很漂亮的景象。",
options:["○ (正確)","✕ (錯誤)"],
answer:"○ (正確)"
},

{
question:"「前車之鑑」是指事情進行得很順利。",
options:["○ (正確)","✕ (錯誤)"],
answer:"✕ (錯誤)"
},

{
question:"「轟轟烈烈」常用來形容事情的聲勢很大。",
options:["○ (正確)","✕ (錯誤)"],
answer:"○ (正確)"
},

{
question:"「五采繽紛」正確寫法是？",
options:["五彩繽紛","五踩繽紛","五採繽紛"],
answer:"五彩繽紛"
},

{
question:"「前車之監」正確寫法是？",
options:["前車之鑑","前車之堅","前車之尖"],
answer:"前車之鑑"
},

{
question:"「相應成趣」正確寫法是？",
options:["相映成趣","相印成趣","相硬成趣"],
answer:"相映成趣"
},

{
question:"「陽光像金雨般密密的灑下來。」使用哪種修辭？",
options:["擬人","明喻","排比","感嘆"],
answer:"明喻"
},

{
question:"「枝頭多了幾個紅色的小鈴鐺，在風裡輕輕哼唱。」修辭是？",
options:["疊字","譬喻","擬人","排比"],
answer:"擬人"
},

{
question:"「葡萄變紫了，木瓜變黃了，芭樂也變翠綠了。」修辭是？",
options:["排比","設問","誇飾","引用"],
answer:"排比"
},

{
question:"「靜悄悄、綠油油、圓圓點點」屬於疊字修辭。",
options:["○ (正確)","✕ (錯誤)"],
answer:"○ (正確)"
},

{
question:"「我想，葡萄藤上的陽光可能是紫色的吧？」是設問句。",
options:["○ (正確)","✕ (錯誤)"],
answer:"○ (正確)"
},

{
question:"「陽光張開翅膀，在果樹上盤旋。」是擬人。",
options:["○ (正確)","✕ (錯誤)"],
answer:"○ (正確)"
},

{
question:"「青澀味像條青竹絲」是哪種修辭？",
options:["明喻","暗喻","擬人","排比"],
answer:"明喻"
},

{
question:"「臉晒得比蓮霧還紅」是哪種修辭？",
options:["誇飾","設問","引用","排比"],
answer:"誇飾"
},

{
question:"〈色香味的陽光〉的寫作特色是？",
options:["用顏色氣味描寫陽光","說明水果生長","介紹農業","說果園歷史"],
answer:"用顏色氣味描寫陽光"
}

];

let current=0
let score=0

function login(){

document.getElementById("app").innerHTML=`

<div class="card">

<h1>☀️ 色香味的陽光</h1>

<p>請輸入你的名字</p>

<input id="name" style="font-size:22px;padding:10px;width:100%">

<button onclick="menu()">開始學習</button>

</div>

`

}

function menu(){

const name=document.getElementById("name").value

localStorage.setItem("student",name)

document.getElementById("app").innerHTML=`

<div class="card menu">

<h2>👤 ${name}</h2>

<button onclick="startQuiz()">課文理解挑戰</button>

</div>

`

}

function startQuiz(){

current=0
score=0

showQuestion()

}

function showQuestion(){

const q=quizData[current]

let html=`

<div class="card">

<div class="progress">
<div class="bar" style="width:${current/quizData.length*100}%"></div>
</div>

<div class="question">

Q${current+1}. ${q.question}

</div>

`

q.options.forEach(opt=>{

html+=`<div class="option" onclick="checkAnswer('${opt}')">${opt}</div>`

})

html+="</div>"

document.getElementById("app").innerHTML=html

}

function checkAnswer(ans){

const q=quizData[current]

if(ans===q.answer){

score++

}

current++

if(current>=quizData.length){

showResult()

}else{

showQuestion()

}

}

function showResult(){

document.getElementById("app").innerHTML=`

<div class="card">

<h1>完成挑戰 🎉</h1>

<div class="result">${score} / ${quizData.length}</div>

<button onclick="startQuiz()">再挑戰一次</button>

</div>

`

}

login()

</script>

</body>
</html>
